version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: mara_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7.0-alpine
    container_name: mara_redis
    restart: always
    ports:
      - "6379:6379"

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: mara_ai_service
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ai_model_cache:/root/.insightface/models

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mara_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/maraphoto
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_SERVICE_URL=http://ai-service:8000
      - JWT_SECRET=production_secret_jwt_access_token_1234
      - JWT_REFRESH_SECRET=production_secret_jwt_refresh_token_5678
      - R2_ACCESS_KEY_ID=mock_access_key
      - R2_SECRET_ACCESS_KEY=mock_secret_key
      - R2_BUCKET_NAME=mara-photo
      - R2_ENDPOINT=https://your_cloudflare_account_id.r2.cloudflarestorage.com
    depends_on:
      - mongodb
      - redis
      - ai-service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mara_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: mara_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mongodb_data:
  ai_model_cache:
